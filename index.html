<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>At Listesi Secimi</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: radial-gradient(circle at 20% 20%, #fef3c7 0, #f6f7fb 40%, #e8eef9 100%);
      color: #102a43;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .wrap {
      width: min(760px, 100%);
      background: #ffffffd9;
      border: 1px solid #d6deeb;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 16px 40px rgba(16, 42, 67, 0.12);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      text-align: center;
    }
    .sub {
      margin: 0 0 20px;
      text-align: center;
      color: #486581;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }
    a.card {
      text-decoration: none;
      color: inherit;
      border: 1px solid #cbd5e1;
      background: #fff;
      border-radius: 14px;
      padding: 18px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }
    a.card:hover {
      transform: translateY(-2px);
      border-color: #0f3d5e;
      box-shadow: 0 8px 20px rgba(15, 61, 94, 0.16);
    }
    .city {
      margin: 0 0 6px;
      font-size: 22px;
    }
    .desc {
      margin: 0;
      font-size: 14px;
      color: #627d98;
    }
    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
      h1 { font-size: 25px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Hangi Sehirin Verisini Gormek Istersin?</h1>
    <p class="sub">Secim yap ve ilgili kosu listesini ac.</p>
    <section class="grid">
      <a class="card" href="izmir_yayin.html">
        <h2 class="city">Izmir</h2>
        <p class="desc">Kosu kosu no, isim, cikti ve stil etiketleri.</p>
      </a>
      <a class="card" href="adana_yayin.html">
        <h2 class="city">Adana</h2>
        <p class="desc">Kosu kosu no, isim, cikti ve stil etiketleri.</p>
      </a>
    </section>
  </main>
</body>
</html>
